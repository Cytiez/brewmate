name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Build needs *some* value for these env vars even if they're not real.
      # Use deliberately fake values so build success doesn't depend on secrets.
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: example_anon_key
      OPENROUTER_API_KEY: example_openrouter_key
      NEXT_PUBLIC_SITE_URL: https://example.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
